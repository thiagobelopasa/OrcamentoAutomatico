name: _set-hf-secret
on:
  push:
    paths:
      - '.github/workflows/_set-hf-secret.yml'

jobs:
  set:
    runs-on: ubuntu-latest
    steps:
      - name: Set DATABASE_URL in HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          DB_URL: ${{ secrets.TEMP_DATABASE_URL }}
        run: |
          python3 << 'EOF'
          import urllib.request, json, os
          url = 'https://huggingface.co/api/spaces/thiagopasa/orcamento-automatico-backend/secrets'
          data = json.dumps({'key': 'DATABASE_URL', 'value': os.environ['DB_URL']}).encode()
          req = urllib.request.Request(url, data=data, headers={
              'Authorization': 'Bearer ' + os.environ['HF_TOKEN'],
              'Content-Type': 'application/json'
          }, method='POST')
          try:
              with urllib.request.urlopen(req) as r:
                  print('Status:', r.status)
          except urllib.error.HTTPError as e:
              print('Error:', e.status, e.read().decode())
          EOF
