name: Deploy Backend → Hugging Face Spaces

on:
  push:
    branches: [master]
    paths:
      - "backend/**"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Push backend para HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
        run: |
          git config --global user.email "deploy@github.com"
          git config --global user.name "GitHub Actions"

          git clone https://$HF_USERNAME:$HF_TOKEN@huggingface.co/spaces/$HF_USERNAME/orcamento-automatico-backend hf_repo

          rsync -av --delete \
            --exclude='.git' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='temp_uploads' \
            --exclude='*.db' \
            backend/ hf_repo/

          cd hf_repo
          git add -A
          git diff --staged --quiet || git commit -m "Deploy: ${{ github.sha }}"
          git push
