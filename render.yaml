services:
  - type: web
    name: orcamento-automatico
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: TRELLO_API_KEY
        sync: false
      - key: TRELLO_API_TOKEN
        sync: false
      - key: TRELLO_BOARD_ID
        sync: false
      - key: AUTO_SYNC_TRELLO
        value: "true"
      - key: GOOGLE_API_KEY
        sync: false
      - key: GOOGLE_DRIVE_FOLDER_ID
        value: "16Lu60kXkRI_wN0V62d1RPN_4JtTEa_TE"
    healthCheckPath: /health
